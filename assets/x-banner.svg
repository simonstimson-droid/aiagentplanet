<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="50%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0A0A0F"/>
    </linearGradient>
    <radialGradient id="planetGlow" cx="85%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.35"/>
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0A0A0F;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Planet glow -->
  <rect width="1500" height="500" fill="url(#planetGlow)"/>

  <!-- Large planet circle (right side) -->
  <circle cx="1200" cy="250" r="280" fill="none" stroke="rgba(167,139,250,0.12)" stroke-width="2"/>
  <circle cx="1200" cy="250" r="200" fill="none" stroke="rgba(167,139,250,0.1)" stroke-width="1.5"/>
  <circle cx="1200" cy="250" r="350" fill="none" stroke="rgba(124,58,237,0.06)" stroke-width="1"/>

  <!-- Planet body -->
  <circle cx="1200" cy="250" r="160" fill="url(#logoGrad)" opacity="0.15"/>
  <circle cx="1200" cy="250" r="160" fill="none" stroke="rgba(167,139,250,0.2)" stroke-width="1.5"/>

  <!-- Orbiting ring -->
  <ellipse cx="1200" cy="250" rx="220" ry="50" fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="2" transform="rotate(-12 1200 250)"/>

  <!-- Small orbiting dot -->
  <circle cx="1380" cy="170" r="8" fill="#A78BFA" opacity="0.5" filter="url(#glow)"/>
  <circle cx="1050" cy="380" r="5" fill="#7C3AED" opacity="0.4"/>

  <!-- Stars / particles -->
  <circle cx="900" cy="80" r="2" fill="white" opacity="0.3"/>
  <circle cx="1100" cy="420" r="1.5" fill="white" opacity="0.25"/>
  <circle cx="800" cy="400" r="2" fill="white" opacity="0.2"/>
  <circle cx="1300" cy="100" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="1400" cy="350" r="2" fill="white" opacity="0.2"/>
  <circle cx="950" cy="200" r="1" fill="white" opacity="0.35"/>
  <circle cx="1050" cy="120" r="1.5" fill="white" opacity="0.25"/>

  <!-- Logo mark (left side) -->
  <rect x="80" y="125" width="250" height="250" rx="55" ry="55" fill="url(#logoGrad)" filter="url(#softGlow)"/>
  <rect x="95" y="140" width="220" height="220" rx="48" ry="48" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Robot face in logo -->
  <rect x="130" y="175" width="180" height="140" rx="25" ry="25" fill="none" stroke="white" stroke-width="5" opacity="0.9"/>
  <circle cx="180" cy="230" r="18" fill="white" opacity="0.95"/>
  <circle cx="180" cy="230" r="8" fill="#7C3AED"/>
  <circle cx="220" cy="230" r="18" fill="white" opacity="0.95"/>
  <circle cx="220" cy="230" r="8" fill="#7C3AED"/>
  <line x1="200" y1="175" x2="200" y2="140" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <circle cx="200" cy="132" r="8" fill="#A78BFA" filter="url(#glow)"/>
  <rect x="150" y="270" width="100" height="16" rx="8" ry="8" fill="white" opacity="0.6"/>

  <!-- Brand name (right of logo) -->
  <text x="380" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="52" fill="white" opacity="0.95">AI Agent Planet</text>
  <text x="380" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="500" font-size="24" fill="#A78BFA" opacity="0.8">Daily AI news for builders</text>
  <text x="380" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="400" font-size="18" fill="#9CA3AF" opacity="0.6">t.me/aiagentplanet</text>

  <!-- Thin divider line -->
  <line x1="380" y1="290" x2="700" y2="290" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
</svg>