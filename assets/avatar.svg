<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="12" y="12" width="488" height="488" rx="90" ry="90" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Planet ring -->
  <ellipse cx="256" cy="220" rx="200" ry="40" fill="none" stroke="rgba(167,139,250,0.2)" stroke-width="2.5" transform="rotate(-8 256 220)"/>

  <!-- Robot head -->
  <rect x="130" y="110" width="252" height="190" rx="38" ry="38" fill="none" stroke="white" stroke-width="7" opacity="0.9"/>

  <!-- Left eye -->
  <circle cx="200" cy="185" r="26" fill="white" opacity="0.95"/>
  <circle cx="200" cy="185" r="12" fill="#7C3AED"/>

  <!-- Right eye -->
  <circle cx="312" cy="185" r="26" fill="white" opacity="0.95"/>
  <circle cx="312" cy="185" r="12" fill="#7C3AED"/>

  <!-- Antenna -->
  <line x1="256" y1="110" x2="256" y2="60" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <circle cx="256" cy="48" r="12" fill="#A78BFA" filter="url(#glow)"/>

  <!-- Mouth / speaker grille -->
  <rect x="180" y="248" width="152" height="24" rx="12" ry="12" fill="white" opacity="0.65"/>
  <rect x="198" y="253" width="28" height="14" rx="7" fill="#7C3AED" opacity="0.5"/>
  <rect x="242" y="253" width="28" height="14" rx="7" fill="#7C3AED" opacity="0.5"/>
  <rect x="286" y="253" width="28" height="14" rx="7" fill="#7C3AED" opacity="0.5"/>

  <!-- Orbiting dot -->
  <circle cx="420" cy="130" r="8" fill="#A78BFA" opacity="0.5"/>
  <circle cx="100" cy="320" r="5" fill="#7C3AED" opacity="0.35"/>

  <!-- Text -->
  <text x="256" y="380" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="36" fill="white" opacity="0.95">AI AGENT PLANET</text>
  <text x="256" y="415" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="500" font-size="18" fill="rgba(167,139,250,0.7)">t.me/aiagentplanet</text>
</svg>