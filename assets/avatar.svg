<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Planet ring -->
  <ellipse cx="256" cy="215" rx="195" ry="40" fill="none" stroke="#A78BFA" stroke-width="2.5" opacity="0.25" transform="rotate(-6 256 215)"/>

  <!-- Robot head -->
  <rect x="100" y="95" width="312" height="230" rx="44" ry="44" fill="none" stroke="white" stroke-width="6" opacity="0.92"/>

  <!-- Left eye -->
  <circle cx="185" cy="180" r="30" fill="white" opacity="0.95"/>
  <circle cx="185" cy="180" r="14" fill="#6366F1"/>

  <!-- Right eye -->
  <circle cx="327" cy="180" r="30" fill="white" opacity="0.95"/>
  <circle cx="327" cy="180" r="14" fill="#6366F1"/>

  <!-- Antenna -->
  <line x1="256" y1="95" x2="256" y2="44" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <circle cx="256" cy="34" r="12" fill="#A78BFA"/>

  <!-- Mouth -->
  <rect x="158" y="260" width="196" height="28" rx="14" fill="white" opacity="0.6"/>
  <rect x="180" y="266" width="32" height="16" rx="8" fill="#6366F1" opacity="0.5"/>
  <rect x="240" y="266" width="32" height="16" rx="8" fill="#6366F1" opacity="0.5"/>
  <rect x="300" y="266" width="32" height="16" rx="8" fill="#6366F1" opacity="0.5"/>

  <!-- Side dots -->
  <circle cx="430" cy="120" r="8" fill="#A78BFA" opacity="0.45"/>
  <circle cx="78" cy="340" r="5" fill="#7C3AED" opacity="0.35"/>

  <!-- Text -->
  <text x="256" y="400" text-anchor="middle" font-family="BlinkMacSystemFont, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="800" font-size="32" fill="white" opacity="0.95">AI AGENT PLANET</text>
  <text x="256" y="432" text-anchor="middle" font-family="BlinkMacSystemFont, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="500" font-size="16" fill="#A78BFA" opacity="0.65">t.me/aiagentplanet</text>
</svg>