<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="400" height="400" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect x="20" y="20" width="360" height="360" rx="70" ry="70" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Robot face -->
  <!-- Head -->
  <rect x="100" y="100" width="200" height="160" rx="30" ry="30" fill="none" stroke="white" stroke-width="6" opacity="0.9"/>

  <!-- Left eye -->
  <circle cx="155" cy="165" r="22" fill="white" opacity="0.95"/>
  <circle cx="155" cy="165" r="10" fill="#7C3AED"/>

  <!-- Right eye -->
  <circle cx="245" cy="165" r="22" fill="white" opacity="0.95"/>
  <circle cx="245" cy="165" r="10" fill="#7C3AED"/>

  <!-- Antenna -->
  <line x1="200" y1="100" x2="200" y2="60" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <circle cx="200" cy="50" r="10" fill="#A78BFA" filter="url(#glow)"/>

  <!-- Mouth / speaker -->
  <rect x="140" y="210" width="120" height="20" rx="10" ry="10" fill="white" opacity="0.7"/>
  <rect x="155" y="215" width="20" height="10" rx="5" fill="#7C3AED" opacity="0.6"/>
  <rect x="190" y="215" width="20" height="10" rx="5" fill="#7C3AED" opacity="0.6"/>
  <rect x="225" y="215" width="20" height="10" rx="5" fill="#7C3AED" opacity="0.6"/>

  <!-- Planet ring (ellipse behind head) -->
  <ellipse cx="200" cy="180" rx="170" ry="35" fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="3" transform="rotate(-8 200 180)"/>

  <!-- Small orbiting dot -->
  <circle cx="340" cy="130" r="6" fill="#A78BFA" opacity="0.6"/>

  <!-- Text -->
  <text x="200" y="320" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="28" fill="white" opacity="0.95">AI AGENT</text>
  <text x="200" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="28" fill="white" opacity="0.95">PLANET</text>
</svg>