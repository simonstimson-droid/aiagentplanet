<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="400" height="400" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Planet ring -->
  <ellipse cx="200" cy="195" rx="165" ry="38" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.3" transform="rotate(-6 200 195)"/>

  <!-- Robot head -->
  <rect x="80" y="90" width="240" height="180" rx="36" ry="36" fill="none" stroke="white" stroke-width="5" opacity="0.92"/>

  <!-- Left eye -->
  <circle cx="150" cy="160" r="24" fill="white" opacity="0.95"/>
  <circle cx="150" cy="160" r="11" fill="#6366F1"/>

  <!-- Right eye -->
  <circle cx="250" cy="160" r="24" fill="white" opacity="0.95"/>
  <circle cx="250" cy="160" r="11" fill="#6366F1"/>

  <!-- Antenna -->
  <line x1="200" y1="90" x2="200" y2="48" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <circle cx="200" cy="38" r="10" fill="#A78BFA" opacity="0.9"/>

  <!-- Mouth -->
  <rect x="130" y="220" width="140" height="22" rx="11" fill="white" opacity="0.6"/>
  <rect x="148" y="225" width="24" height="12" rx="6" fill="#6366F1" opacity="0.5"/>
  <rect x="188" y="225" width="24" height="12" rx="6" fill="#6366F1" opacity="0.5"/>
  <rect x="228" y="225" width="24" height="12" rx="6" fill="#6366F1" opacity="0.5"/>

  <!-- Side dots -->
  <circle cx="345" cy="125" r="6" fill="#A78BFA" opacity="0.5"/>
  <circle cx="70" cy="300" r="4" fill="#7C3AED" opacity="0.4"/>

  <!-- Text -->
  <text x="200" y="325" text-anchor="middle" font-family="BlinkMacSystemFont, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="800" font-size="26" fill="white" opacity="0.95">AI AGENT PLANET</text>
  <text x="200" y="355" text-anchor="middle" font-family="BlinkMacSystemFont, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="500" font-size="14" fill="#A78BFA" opacity="0.7">t.me/aiagentplanet</text>
</svg>